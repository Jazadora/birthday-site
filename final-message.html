<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Final Message 🎬</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('images/background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 320px;
      width: 90%;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .card:hover,
    .card:focus {
      box-shadow: 0 12px 36px rgba(255, 107, 157, 0.28);
    }

    h1 {
      color: #ff6b9d;
      margin-bottom: 12px;
      font-size: 1.4rem;
      line-height: 1.2;
    }

    p {
      color: #555;
      margin-bottom: 25px;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    video {
      width: 100%;
      height: auto;
      max-height: 300px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      display: block;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Thank You for Watching! 🎉</h1>
    <p>This is my final message for you. I hope you enjoyed everything. Here's one last video to end it all beautifully.
      💖</p>
    <video controls poster="images/photo1.jpg">
      <source src="videos/final-message.mp4" type="video/mp4">
      Your browser doesn't support the video tag.
    </video>
  </div>
</body>

</html>
