<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tap to Begin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('bj1.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #fff;
      text-align: center;
    }
    .card {
      padding: 30px 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      backdrop-filter: blur(6px);
      max-width: 350px;
      width: 90%;
    }
    h1 { margin-bottom: 10px; font-size: 1.8rem; }
    p { margin: 0 0 15px; font-size: 1rem; }
    button {
      margin-top: 10px;
      padding: 12px 25px;
      border: none;
      border-radius: 999px;
      background: #ffffff;
      color: #ff4f8b;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tap here 👀</h1>
    <p>I made something small just for you.</p>
    <button onclick="window.location.href='are-you-excited.html'">
      Tap to continue
    </button>
  </div>

  <footer style="position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-family: Arial, sans-serif; font-size: 0.75rem; text-align: center; z-index: 1000; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); pointer-events: none;">
    Jazmindesigns © 2026 💖
  </footer>
</body>
</html>
