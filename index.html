<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Tap to Begin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('bj1.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
      text-align: center;
      padding: 40px 20px 80px;
      /* Space for footer */
    }

    .card {
      padding: 40px 25px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      max-width: 320px;
      width: 85%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    h1 {
      margin-bottom: 12px;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
    }

    p {
      margin: 0 0 20px;
      font-size: 1rem;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.9);
    }

    button {
      margin-top: 10px;
      padding: 14px 30px;
      border: none;
      border-radius: 50px;
      background: #ffffff;
      color: #ff4f8b;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 79, 139, 0.3);
      transition: all 0.2s ease;
      width: 100%;
    }

    button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 8px rgba(255, 79, 139, 0.2);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Tap here 👀</h1>
    <p>I made something small just for you.</p>
    <button onclick="window.location.href='are-you-excited.html'">
      Tap to continue
    </button>
  </div>

  <footer
    style="position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-family: Arial, sans-serif; font-size: 0.75rem; text-align: center; z-index: 1000; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); pointer-events: none;">
    Jazmindesigns © 2026 💖
  </footer>
</body>

</html>
