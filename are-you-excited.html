<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Are You Excited?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('bj2.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px 80px;
      /* Space for footer */
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 320px;
      width: 90%;
      backdrop-filter: blur(5px);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.5rem;
      line-height: 1.3;
      color: #333;
    }

    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 28px;
      border-radius: 50px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s;
      flex: 1;
      min-width: 120px;
    }

    .yes {
      background: #ff4f8b;
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 79, 139, 0.3);
    }

    .no {
      background: #f0f0f0;
      color: #777;
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Are you excited to see what I have for you? 🥹</h1>
    <div class="buttons">
      <button class="yes" onclick="window.location.href='photos.html'">
        Yes 😍
      </button>
      <button class="no" onclick="window.location.href='no-big-head.html'">
        No 😒
      </button>
    </div>
  </div>

  <footer
    style="position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-family: Arial, sans-serif; font-size: 0.75rem; text-align: center; z-index: 1000; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); pointer-events: none;">
    Jazmindesigns © 2026 💖
  </footer>
</body>

</html>
