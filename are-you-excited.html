<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Are You Excited?</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('bj2.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      padding: 25px 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 380px;
      width: 100%;
    }
    h1 { margin-bottom: 15px; font-size: 1.4rem; }
    .buttons {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 22px;
      border-radius: 999px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .yes { background: #ff4f8b; color: #fff; }
    .no { background: #ffd6e8; color: #ff4f8b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Are you excited to see what I have for you? 🥹</h1>
    <div class="buttons">
      <button class="yes" onclick="window.location.href='photos.html'">
        Yes 😍
      </button>
      <button class="no" onclick="window.location.href='no-big-head.html'">
        No 😒
      </button>
    </div>
  </div>

  <footer style="position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-family: Arial, sans-serif; font-size: 0.75rem; text-align: center; z-index: 1000; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); pointer-events: none;">
    Jazmindesigns © 2026 💖
  </footer>
</body>
</html>
