<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>You Big Head 😤</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('bj3.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px 80px;
      /* Space for footer */
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 35px 25px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      max-width: 320px;
      width: 90%;
      backdrop-filter: blur(5px);
    }

    h1 {
      margin-bottom: 12px;
      font-size: 1.5rem;
      line-height: 1.2;
      color: #333;
    }

    p {
      margin-bottom: 25px;
      font-size: 1rem;
      line-height: 1.4;
      color: #555;
    }

    button {
      padding: 14px 30px;
      border-radius: 50px;
      border: none;
      background: #ff4f8b;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(255, 79, 139, 0.3);
      transition: transform 0.2s;
      width: 100%;
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>You big head! 🤨</h1>
    <p>Why did you choose "No"? You don't even have a choice. Tap yes and behave. 😂</p>
    <button onclick="window.location.href='photos.html'">
      Okay okay, show me 😌
    </button>
  </div>

  <footer
    style="position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-family: Arial, sans-serif; font-size: 0.75rem; text-align: center; z-index: 1000; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); pointer-events: none;">
    Jazmindesigns © 2026 💖
  </footer>
</body>

</html>
