<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>You Big Head 😤</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url('bj3.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      padding: 25px 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      max-width: 380px;
      width: 100%;
    }
    h1 { margin-bottom: 12px; font-size: 1.5rem; }
    p { margin-bottom: 20px; font-size: 1rem; }
    button {
      padding: 10px 25px;
      border-radius: 999px;
      border: none;
      background: #ff4f8b;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <h1>You big head! 🤨</h1>
    <p>Why did you choose "No"? You don't even have a choice. Tap yes and behave. 😂</p>
    <button onclick="window.location.href='photos.html'">
      Okay okay, show me 😌
    </button>
  </div>

  <footer style="position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.8); font-family: Arial, sans-serif; font-size: 0.75rem; text-align: center; z-index: 1000; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); pointer-events: none;">
    Jazmindesigns © 2026 💖
  </footer>
</body>
</html>
